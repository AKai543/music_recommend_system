<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放 - 音乐推荐系统</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        .play-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .song-info {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .song-info h2 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .song-info p {
            margin: 5px 0;
            color: #666;
        }
        .audio-player {
            width: 100%;
            margin: 20px 0;
        }
        .btn-back {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .btn-back:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>音乐推荐系统</h1>
            <div class="user-info">
                <span id="username">访客</span>
                <button id="logoutBtn" class="btn btn-secondary">退出登录</button>
            </div>
        </div>
    </header>

    <main class="play-container">
        <button class="btn-back" onclick="window.history.back()">返回推荐页</button>
        
        <div class="song-info">
            <h2 id="songName">加载中...</h2>
            <p id="songSinger">歌手：加载中...</p>
            <p id="songAlbum">专辑：加载中...</p>
            <p id="songStyle">风格：加载中...</p>
        </div>
        
        <div class="player-section">
            <h3>播放器</h3>
            <audio id="audioPlayer" class="audio-player" controls>
                您的浏览器不支持音频播放。
            </audio>
        </div>
    </main>

    <script src="static/js/main.js"></script>
    <script>
        // 页面加载完成后初始化播放器
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化用户信息
            const userInfo = getUserInfo();
            if (userInfo) {
                document.getElementById('username').textContent = userInfo.username;
            }
            
            // 退出登录事件
            document.getElementById('logoutBtn').addEventListener('click', function() {
                clearUserInfo();
                window.location.href = 'login.html';
            });
            
            // 获取URL中的song_id参数
            const urlParams = new URLSearchParams(window.location.search);
            const songId = urlParams.get('song_id');
            
            if (songId) {
                loadSongInfo(songId);
            } else {
                alert('未找到歌曲ID');
                window.history.back();
            }
        });
        
        // 加载歌曲信息
        function loadSongInfo(songId) {
            fetch(`${API_BASE_URL}/song_detail?song_id=${songId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        const song = data.data;
                        displaySongInfo(song);
                        setupAudioPlayer(song);
                    } else {
                        alert('获取歌曲信息失败');
                        window.history.back();
                    }
                })
                .catch(error => {
                    console.error('加载歌曲信息失败:', error);
                    alert('加载歌曲信息失败，请检查网络连接');
                    window.history.back();
                });
        }
        
        // 显示歌曲信息
        function displaySongInfo(song) {
            document.getElementById('songName').textContent = song.song_name;
            document.getElementById('songSinger').textContent = `歌手：${song.singer}`;
            document.getElementById('songAlbum').textContent = `专辑：${song.album}`;
            document.getElementById('songStyle').textContent = `风格：${song.style}`;
        }
        
        // 设置音频播放器
        function setupAudioPlayer(song) {
            const audioPlayer = document.getElementById('audioPlayer');
            
            // 检查是否有音乐文件路径
            if (song.has_music_file && song.music_file_path) {
                audioPlayer.src = song.music_file_path;
            } else {
                audioPlayer.src = '';
                alert('抱歉，该歌曲暂无音频文件');
            }
        }
    </script>
</body>
</html>
